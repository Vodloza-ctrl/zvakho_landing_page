<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <link rel="icon" href="/assets/brand/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
  <script src="/config.js"></script>

  <title>ZVAKHO Store</title>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <div class="wrap nav-inner">
    <a class="brand" href="/">
      <img src="/assets/brand/zvakho-logo.webp" alt="ZVAKHO">
    </a>

    <div class="nav-links">
      <a href="/#platform">Platform</a>
      <a href="/#artists">Artists</a>
    </div>

    <a class="btn primary" href="https://wa.me/263719362231?text=ZVAKHO">
      Request access
    </a>
  </div>
</nav>

<!-- HERO -->
<header class="store-hero" id="storeHero">
  <div class="wrap">
    <div class="kicker">Official Store</div>

    <h1 id="artistName">Loading...</h1>
    <p id="artistSub">Loading store...</p>

    <div class="actions">
      <a class="btn gold" id="artistWa" href="#">Buy via WhatsApp</a>
      <a class="btn" href="/">Back</a>
    </div>
  </div>
</header>

<!-- STORE -->
<main class="wrap store-panel">

  <!-- PRODUCTS -->
  <section class="track-list" id="tracks">
    <div class="empty">Loading store...</div>
  </section>

  <!-- CART -->
  <section class="card" id="cartBox" style="display:none; margin-top:30px;">
    <div class="eyebrow">Cart</div>
    <h3>Your Order</h3>

    <div id="cartItems"></div>

    <div class="list-row" style="margin-top:12px;">
      <span>Total</span>
      <strong id="cartTotal">$0.00</strong>
    </div>

    <!-- USER INPUT (ADDED CLEANLY) -->
    <div style="margin-top:16px;">
      <input 
        id="customerPhone" 
        placeholder="Enter EcoCash number (e.g. 2637...)" 
        style="width:100%; padding:12px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc;"
      >

      <input 
        id="customerEmail" 
        placeholder="Enter email (required for payment)" 
        style="width:100%; padding:12px; border-radius:6px; border:1px solid #ccc;"
      >
    </div>

    <button class="btn gold" onclick="checkout()" style="margin-top:16px; width:100%;">
      Checkout
    </button>
  </section>

</main>

<!-- FOOTER -->
<footer>
  <div class="wrap footer-grid">
    <div>
      <img class="footer-logo" src="/assets/brand/zvakho-logo.webp" alt="ZVAKHO">
      <p>Direct-to-fan commerce infrastructure.</p>
    </div>
  </div>
</footer>

<!-- CORE LOGIC -->
<script src="/app.js"></script>

</body>
</html>
