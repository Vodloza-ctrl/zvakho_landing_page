<!DOCTYPE html>
<html>
<head>
  <title>Artist Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial;
      background: #0e0e0e;
      color: white;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2 id="artist-name">Artist</h2>

<div class="card">
  <h3>Total Revenue</h3>
  <p id="revenue">$0.00</p>
</div>

<div class="card">
  <h3>Paid Orders</h3>
  <p id="orders">0</p>
</div>

<div class="card">
  <h3>Pending Orders</h3>
  <p id="pending">0</p>
</div>

<script>
const API = "https://zvakho-payments-v2.yasibomedia.workers.dev";

// get artist from URL
const params = new URLSearchParams(window.location.search);
const artist = params.get("artist")?.toUpperCase();

async function loadArtist() {
  const res = await fetch(`${API}/artist-dashboard?artist_id=${artist}`);
  const data = await res.json();

  document.getElementById("artist-name").innerText =
    data.artist_name || artist;

  document.getElementById("revenue").innerText =
    "$" + (data.summary?.total_revenue || 0).toFixed(2);

  document.getElementById("orders").innerText =
    data.summary?.paid_orders || 0;

  document.getElementById("pending").innerText =
    data.summary?.pending_orders || 0;
}

loadArtist();
setInterval(loadArtist, 20000);
</script>

</body>
</html>
